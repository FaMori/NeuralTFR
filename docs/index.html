<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Interactive visualization of Total Fertility Rate (TFR) predictions from multiple forecasting models across 195 countries.">
  <title>NeuralTFR — TFR Model Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading TFR data…</div>
  </div>

  <div class="app">
    <!-- Header -->
    <header>
      <div class="header-content" style="width: 100%;">
        <div class="header-title-row" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
          <h1>NeuralTFR</h1>
        </div>
        <p class="subtitle" style="font-size: 0.95rem; color: var(--text-secondary); max-width: 800px; line-height: 1.5;">
          A global fertility projection model using recurrent neural networks (RNN-GRU) to forecast future trajectories across 195 countries.
        </p>
      </div>
    </header>

    <!-- Sidebar controls -->
    <aside class="sidebar">
      <!-- Country selector -->
      <div class="glass-card panel" id="country-panel">
        <div class="panel-title">Country</div>
        <div class="search-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z"
              clip-rule="evenodd" />
          </svg>
          <input type="text" id="country-search" placeholder="Search countries…" autocomplete="off">
        </div>
        <div class="country-list" id="country-list"></div>
      </div>

      <!-- Prediction Horizon -->
      <div class="glass-card panel">
        <div class="panel-title">Prediction Horizon</div>
        <div class="horizon-selector" id="horizon-selector">
          <div class="horizon-label-row">
            <span class="horizon-label" id="horizon-label-text">Forecast until</span>
            <span class="horizon-value" id="horizon-value">2042</span>
          </div>
          <input type="range" id="horizon-slider" min="2024" max="2042" value="2042" step="1">
          <div class="horizon-ticks">
            <span>2024</span>
            <span>2033</span>
            <span>2042</span>
          </div>
        </div>
      </div>

      <!-- Models -->
      <div class="glass-card panel">
        <div class="panel-title">Models</div>
        <div class="model-toggles" id="model-toggles"></div>
      </div>

      <!-- Data Options -->
      <div class="glass-card panel" id="data-options-panel">
        <div class="panel-title">Data Options</div>
        <div class="model-toggles" id="data-toggles">
          <label class="model-toggle">
            <input type="checkbox" id="toggle-historical-points" checked>
            <span class="toggle-indicator"></span>
            <span class="model-name">Empirical Points (Raw)</span>
          </label>
        </div>
      </div>
    </aside>

    <!-- Main chart area -->
    <main class="main-content">
      <!-- Tabs -->
      <div class="tabs-container">
        <button class="tab-btn active" id="tab-chart">Chart</button>
        <button class="tab-btn" id="tab-map">Map</button>
      </div>

      <!-- Chart View -->
      <div id="view-chart" class="view-section active">
        <div class="glass-card chart-container">
          <div class="chart-header">
            <span class="chart-title" id="chart-title">Select a country</span>
            <div class="chart-actions">
              <button class="btn-icon" id="btn-reset-zoom" title="Reset zoom">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                    clip-rule="evenodd" />
                </svg>
              </button>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="main-chart"></canvas>
          </div>
        </div>
        <div class="glass-card chart-legend" id="chart-legend"></div>
      </div>

      <!-- Map View -->
      <div id="view-map" class="view-section">
        <div class="glass-card map-container">
          <div id="choropleth-map"
            style="height: 100%; width: 100%; min-height: 500px; border-radius: var(--radius-lg);"></div>
        </div>
        <div class="glass-card map-legend" id="map-legend"></div>
      </div>
    </main>
  </div>

  <!-- Chart.js + Zoom plugin + Leaflet from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
